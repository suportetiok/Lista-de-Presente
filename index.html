<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎁 Chá de Panelas Virtual</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="qrcode.min.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- ====================== -->
<!-- TELA INICIAL           -->
<!-- ====================== -->
<section id="screen-start" class="min-h-screen flex flex-col items-center justify-center p-6">
    
    <h1 class="text-4xl font-bold mb-3">🎁 Chá de Panelas Virtual</h1>
    <p class="text-lg text-gray-600 mb-6">Identifique-se para acessar a lista</p>

    <div class="w-full max-w-sm bg-white p-6 rounded-2xl shadow">

        <label class="font-semibold text-sm">Seu Nome</label>
        <input id="user-name" type="text" 
               placeholder="Digite seu nome completo"
               class="w-full border rounded-lg px-4 py-2 mt-1 mb-4" />

        <button onclick="enterList()" 
                class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold">
            Entrar na Lista
        </button>

        <button onclick="openAdminLogin()" 
                class="w-full mt-4 text-center text-sm text-gray-600 underline">
            Acesso Administrativo
        </button>
    </div>
</section>


<!-- ====================== -->
<!-- ADMIN LOGIN            -->
<!-- ====================== -->
<section id="screen-admin-login" class="hidden min-h-screen flex items-center justify-center p-6">
    
    <div class="w-full max-w-sm bg-white p-6 rounded-2xl shadow">
        <h2 class="text-2xl font-bold mb-4 text-center">🔐 Acesso Administrativo</h2>

        <label class="text-sm font-semibold">Senha do Administrador</label>
        <input id="admin-password" type="password" class="w-full border rounded-lg px-3 py-2 mb-4">

        <button onclick="adminLogin()" 
                class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold">
            Entrar
        </button>

        <button onclick="backToStart()" 
                class="w-full mt-3 text-gray-600 underline text-sm">
            Voltar
        </button>
    </div>
</section>


<!-- ========================= -->
<!-- LISTA DE PRESENTES        -->
<!-- ========================= -->
<section id="screen-list" class="hidden min-h-screen p-6">
    
    <header class="flex justify-between mb-6">
        <h1 class="text-2xl font-bold">Lista de Presentes</h1>
        <span id="user-display" class="text-gray-600"></span>
    </header>

    <div id="gifts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        Carregando...
    </div>
</section>


<!-- ========================= -->
<!-- MODAL PIX COM QR CODE     -->
<!-- ========================= -->
<div id="pix-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-6">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md relative">

        <button onclick="closePix()" 
                class="absolute right-4 top-4 text-gray-500 text-xl">&times;</button>

        <h2 class="text-xl font-bold mb-4">Pagamento via PIX</h2>

        <div class="mb-4">
            <div id="qrcode" class="mx-auto"></div>
        </div>

        <p class="font-semibold mb-1">Chave PIX:</p>
        <p id="pix-key" class="bg-gray-100 p-3 rounded-lg text-sm break-all mb-3"></p>

        <button onclick="copyPixKey()" 
                class="w-full bg-gray-800 text-white py-2 rounded-lg mb-3">
            Copiar chave
        </button>

        <button onclick="confirmPix()" 
                class="w-full bg-green-600 text-white py-2 rounded-lg">
            Marcar como Pago
        </button>

    </div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
